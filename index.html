<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplication Chart Printable</title>
  <meta name="description" content="Free printable multiplication charts. Download and print multiplication tables for kids.">
  <link rel="canonical" href="https://multiplicationchartprintable.app/" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a1a; padding: 20px; }
    .container { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 20px; font-size: 14px; }
    table { border-collapse: collapse; margin: 0 auto 20px; font-size: 13px; }
    th, td { width: 42px; height: 28px; text-align: center; border: 1px solid #ddd; }
    th { background: #2563eb; color: #fff; font-weight: 700; }
    td:first-child { background: #e8f0fe; font-weight: 700; color: #2563eb; }
    tr:nth-child(even) td:not(:first-child) { background: #f8f9fa; }
    .full-version { display: block; text-align: center; margin-top: 24px; padding: 14px; background: #2563eb; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 15px; }
    .full-version:hover { background: #1d4ed8; }
    footer { margin-top: 32px; text-align: center; font-size: 12px; color: #999; }
    footer a { color: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Multiplication Chart Printable</h1>
    <p class="subtitle">1-10 multiplication table preview</p>
    <table id="chart"></table>
    <a class="full-version" href="https://multiplicationchartprintable.app/">
      Download Full Multiplication Chart Printable
    </a>
    <footer>
      <p>Full version at <a href="https://multiplicationchartprintable.app/">Multiplication Chart Printable</a></p>
    </footer>
  </div>
  <script>
    var t = document.getElementById('chart');
    var header = t.insertRow();
    header.insertCell().textContent = 'x';
    header.cells[0].tagName !== 'TH' && (header.cells[0].outerHTML = '<th>x</th>');
    for (var i = 1; i <= 10; i++) {
      header.innerHTML += '<th>' + i + '</th>';
    }
    for (var r = 1; r <= 10; r++) {
      var row = t.insertRow();
      row.innerHTML = '<td>' + r + '</td>';
      for (var c = 1; c <= 10; c++) {
        row.innerHTML += '<td>' + (r * c) + '</td>';
      }
    }
  </script>
</body>
</html>
