<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiplication Chart Printable</title>
  <link rel="canonical" href="https://multiplicationchartprintable.app/" />
  <style>
    body { font-family: Arial, sans-serif; max-width: 750px; margin: 40px auto; padding: 0 20px; text-align: center; }
    h1 { color: #2c3e50; }
    table { border-collapse: collapse; margin: 20px auto; font-size: 13px; }
    td, th { width: 36px; height: 32px; border: 1px solid #ccc; text-align: center; }
    th { background: #2980b9; color: #fff; font-weight: bold; }
    td.highlight { background: #ecf0f1; }
    button { margin: 8px; padding: 10px 20px; background: #2980b9; color: #fff; border: none; cursor: pointer; border-radius: 4px; font-size: 15px; }
    button:hover { background: #1a6ea8; }
    .cta { display: inline-block; margin-top: 24px; padding: 12px 28px; background: #27ae60; color: #fff; text-decoration: none; border-radius: 4px; font-size: 16px; font-weight: bold; }
    .cta:hover { background: #1e8449; }
    footer { margin-top: 40px; font-size: 0.9em; color: #555; }
  </style>
</head>
<body>
  <h1>Multiplication Chart Printable</h1>
  <p>Free printable multiplication chart from 1 to 12.</p>

  <button onclick="window.print()">Print Chart</button>

  <table id="chart"></table>

  <br />
  <a class="cta" href="https://multiplicationchartprintable.app/">Multiplication Chart Printable</a>

  <footer>
    <p>For more chart options, visit <a href="https://multiplicationchartprintable.app/">Multiplication Chart Printable</a>.</p>
  </footer>

  <script>
    (function() {
      const table = document.getElementById('chart');
      const size = 12;
      // Header row
      let headerRow = '<tr><th>&times;</th>';
      for (let i = 1; i <= size; i++) headerRow += '<th>' + i + '</th>';
      headerRow += '</tr>';
      table.innerHTML = headerRow;
      // Data rows
      for (let r = 1; r <= size; r++) {
        let row = '<tr><th>' + r + '</th>';
        for (let c = 1; c <= size; c++) {
          const cls = (r % 2 === 0) ? ' class="highlight"' : '';
          row += '<td' + cls + '>' + (r * c) + '</td>';
        }
        row += '</tr>';
        table.innerHTML += row;
      }
    })();
  </script>
</body>
</html>
